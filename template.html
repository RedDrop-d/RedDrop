<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🔴 RedDrop</title>
    <style>
        :root {
            --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
            --text: #ffffff; --text2: #a0a0a0; --accent: #ff1744;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --safe-top: env(safe-area-inset-top, 16px);
        }
        .theme-light { --bg: #f5f5f5; --surface: #ffffff; --surface2: #e8e8e8; --text: #1a1a1a; --text2: #666666; }
        .theme-amoled { --bg: #000000; --surface: #0a0a0a; --surface2: #111111; }
        .theme-red { --bg: #0d0002; --surface: #1a0005; --surface2: #220008; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; height: 100dvh; overflow: hidden; font-size: 16px; transition: background 0.3s, color 0.3s; }
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; background: var(--bg); padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
        .screen.active { display: flex; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; z-index: 10; flex-shrink: 0; background: var(--bg); }
        .header-logo { font-size: 1.5rem; font-weight: 900; }
        .header-logo .red { color: var(--accent); }
        .feed-container { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .feed-container::-webkit-scrollbar { display: none; }
        .video-card { height: calc(100vh - 56px - var(--safe-top) - var(--safe-bottom)); height: calc(100dvh - 56px - var(--safe-top) - var(--safe-bottom)); scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        .video-card video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .video-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 16px 100px; background: linear-gradient(transparent, rgba(0,0,0,0.7)); pointer-events: none; }
        .video-user { font-weight: 700; font-size: 0.95rem; }
        .video-desc { font-size: 0.85rem; color: #ccc; }
        .video-actions { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 5; }
        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; }
        .action-icon { width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .action-count { font-size: 0.75rem; font-weight: 600; color: #fff; }
        .bottom-nav { position: fixed; z-index: 100; display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--surface2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: all 0.3s; }
        .nav-pos-bottom .bottom-nav { bottom: calc(8px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); flex-direction: row; border-radius: 28px; padding: 6px 12px; }
        .nav-pos-right .bottom-nav { right: 8px; top: 50%; transform: translateY(-50%); flex-direction: column; border-radius: 28px; padding: 8px 6px; }
        .nav-pos-left .bottom-nav { left: 8px; top: 50%; transform: translateY(-50%); flex-direction: column; border-radius: 28px; padding: 8px 6px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 10px; border-radius: 20px; cursor: pointer; color: var(--text2); font-size: 0.65rem; font-weight: 500; }
        .nav-pos-right .nav-item, .nav-pos-left .nav-item { padding: 10px 8px; }
        .nav-item.active { color: var(--accent); }
        .nav-item .nav-icon { font-size: 1.3rem; }
        .settings-group { padding: 0 16px; margin-bottom: 20px; }
        .settings-label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); border-radius: 14px; margin-bottom: 6px; cursor: pointer; }
        .color-dots { display: flex; gap: 8px; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: var(--text); transform: scale(1.15); }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px 24px; border-radius: 24px; font-weight: 700; cursor: pointer; font-size: 0.9rem; width: 100%; margin-top: 12px; }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .input-field { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--surface2); background: var(--surface); color: var(--text); font-size: 1rem; outline: none; margin-bottom: 10px; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; padding: 10px 24px; border-radius: 24px; font-weight: 700; z-index: 200; animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards; pointer-events: none; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    </style>
</head>
<body class="nav-pos-right theme-dark">

<div id="toastContainer"></div>

<!-- ЛЕНТА -->
<div class="screen active" id="screen-feed">
    <div class="header">
        <div class="header-logo"><span class="red">🔴</span> RedDrop</div>
        <div class="header-icons">
            <span onclick="showScreen('screen-settings')">⚙️</span>
            <span onclick="showScreen('screen-auth')">👤</span>
        </div>
    </div>
    <div class="feed-container" id="feedContainer"></div>
</div>

<!-- АВТОРИЗАЦИЯ -->
<div class="screen" id="screen-auth" style="padding:20px;justify-content:center;align-items:center;">
    <div style="width:100%;max-width:320px;">
        <div style="text-align:center;margin-bottom:24px;">
            <div style="font-size:3rem;">🔴</div>
            <h2>RedDrop</h2>
            <p style="color:var(--text2);">Вход / Регистрация</p>
        </div>
        <input type="text" id="authNickname" class="input-field" placeholder="Никнейм">
        <input type="password" id="authPassword" class="input-field" placeholder="Пароль">
        <button class="btn" id="btnLogin">Войти</button>
        <button class="btn btn-outline" id="btnRegister">Зарегистрироваться</button>
        <p id="authMsg" style="text-align:center;margin-top:12px;font-size:0.85rem;"></p>
    </div>
</div>

<!-- ПРОФИЛЬ -->
<div class="screen" id="screen-profile">
    <div class="header">
        <span style="font-size:1.5rem;cursor:pointer;" onclick="showScreen('screen-feed')">←</span>
        <h3>Профиль</h3>
        <span style="font-size:1.3rem;cursor:pointer;" onclick="showScreen('screen-settings')">⚙️</span>
    </div>
    <div style="flex:1;overflow-y:auto;text-align:center;padding:24px;">
        <div style="font-size:4rem;">👤</div>
        <h2 id="profileName">-</h2>
        <p style="color:var(--text2);" id="profileStatus">-</p>
        <p style="font-size:0.9rem;color:var(--accent);" id="profileSpark">Spark: 0 дн.</p>
        <div style="margin:12px 0;"><strong id="profileLikes">0</strong> лайков</div>
        <button class="btn btn-outline" id="btnLogout">Выйти</button>
    </div>
</div>

<!-- НАСТРОЙКИ -->
<div class="screen" id="screen-settings">
    <div class="header">
        <span style="font-size:1.5rem;cursor:pointer;" onclick="showScreen('screen-feed')">←</span>
        <h3>⚙️ Настройки</h3><div></div>
    </div>
    <div style="flex:1;overflow-y:auto;padding-bottom:40px;">
        <div class="settings-group">
            <div class="settings-label">🎨 Тема</div>
            <div class="setting-row" id="opt-dark"><span>🌙 Тёмная</span><span class="check">●</span></div>
            <div class="setting-row" id="opt-light"><span>☀️ Светлая</span><span class="check" style="color:transparent;">●</span></div>
            <div class="setting-row" id="opt-amoled"><span>⬛ AMOLED</span><span class="check" style="color:transparent;">●</span></div>
            <div class="setting-row" id="opt-red"><span>🔴 Красная</span><span class="check" style="color:transparent;">●</span></div>
        </div>
        <div class="settings-group">
            <div class="settings-label">📍 Меню</div>
            <div class="setting-row" id="opt-nav-right"><span>📱 RightFlow (справа)</span><span class="check">●</span></div>
            <div class="setting-row" id="opt-nav-bottom"><span>📱 Classic (снизу)</span><span class="check" style="color:transparent;">●</span></div>
            <div class="setting-row" id="opt-nav-left"><span>📱 LeftFlow (слева)</span><span class="check" style="color:transparent;">●</span></div>
        </div>
    </div>
</div>

<!-- МЕНЮ -->
<nav class="bottom-nav" id="bottomNav">
    <div class="nav-item active" data-screen="screen-feed"><span class="nav-icon">🏠</span><span>Лента</span></div>
    <div class="nav-item" data-screen="screen-settings"><span class="nav-icon">⚙️</span><span>Настройки</span></div>
    <div class="nav-item" data-screen="screen-auth"><span class="nav-icon">👤</span><span>Войти</span></div>
</nav>

<script>
// Не используем модули, всё на чистом JS для максимальной совместимости

const firebaseConfig = {
    apiKey: "AIzaSyB6fBY4PTUm116OsfoHmM027Q-B-ZdVftE",
    authDomain: "reddrop-36645.firebaseapp.com",
    projectId: "reddrop-36645",
    storageBucket: "reddrop-36645.firebasestorage.app",
    messagingSenderId: "447748198544",
    appId: "1:447748198544:web:0037c9c0a6ec9249fec815"
};

// ТЕСТОВЫЕ ВИДЕО (реальные, сразу видны)
const VIDEOS = [
    { url: "https://www.w3schools.com/html/mov_bbb.mp4", name: "Шутка #67 😂", user: "FunnyRed" },
    { url: "https://sample-videos.com/video321/mp4/720/big_buck_bunny_720p_1mb.mp4", name: "Пейзаж 4K 🌄", user: "NatureRed" },
    { url: "https://filesamples.com/samples/video/mp4/sample_640x360.mp4", name: "Тутор #1 📚", user: "TechRed" }
];

let currentUser = null;
let settings = { theme: 'dark', navPos: 'right' };

// ===== ТОСТ =====
function toast(msg) {
    const t = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    t.appendChild(el);
    setTimeout(() => el.remove(), 2000);
}

// ===== НАВИГАЦИЯ =====
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const nav = document.querySelector(`.nav-item[data-screen="${id}"]`);
    if (nav) nav.classList.add('active');
    if (id === 'screen-profile' && currentUser) loadProfile();
}

// ===== ТЕМЫ И МЕНЮ =====
function applySettings() {
    document.body.className = 'nav-pos-' + settings.navPos + ' theme-' + settings.theme;
    ['dark','light','amoled','red'].forEach(t => {
        const el = document.getElementById('opt-' + t);
        if (el) el.querySelector('.check').style.color = t === settings.theme ? 'var(--accent)' : 'transparent';
    });
    ['right','bottom','left'].forEach(p => {
        const el = document.getElementById('opt-nav-' + p);
        if (el) el.querySelector('.check').style.color = p === settings.navPos ? 'var(--accent)' : 'transparent';
    });
    localStorage.setItem('reddrop_settings', JSON.stringify(settings));
}

document.getElementById('opt-dark').onclick = () => { settings.theme = 'dark'; applySettings(); };
document.getElementById('opt-light').onclick = () => { settings.theme = 'light'; applySettings(); };
document.getElementById('opt-amoled').onclick = () => { settings.theme = 'amoled'; applySettings(); };
document.getElementById('opt-red').onclick = () => { settings.theme = 'red'; applySettings(); };
document.getElementById('opt-nav-right').onclick = () => { settings.navPos = 'right'; applySettings(); };
document.getElementById('opt-nav-bottom').onclick = () => { settings.navPos = 'bottom'; applySettings(); };
document.getElementById('opt-nav-left').onclick = () => { settings.navPos = 'left'; applySettings(); };

// ===== АВТОРИЗАЦИЯ (без Firebase SDK — простой localStorage) =====
document.getElementById('btnRegister').onclick = function() {
    const nick = document.getElementById('authNickname').value.trim();
    const pass = document.getElementById('authPassword').value.trim();
    const msg = document.getElementById('authMsg');
    msg.style.color = 'var(--accent)';
    
    if (!nick || !pass) { msg.textContent = '⚠️ Заполни все поля!'; return; }
    if (nick.length < 3) { msg.textContent = '⚠️ Ник от 3 символов!'; return; }
    if (pass.length < 4) { msg.textContent = '⚠️ Пароль от 4 символов!'; return; }
    
    const users = JSON.parse(localStorage.getItem('reddrop_users') || '{}');
    if (users[nick]) { msg.textContent = '⚠️ Этот ник уже занят!'; return; }
    
    users[nick] = { password: pass, likes: 0, likedVideos: [], spark: { days: 0, level: 1 }, createdAt: new Date().toISOString() };
    localStorage.setItem('reddrop_users', JSON.stringify(users));
    msg.style.color = '#4caf50';
    msg.textContent = '✅ Аккаунт создан! Теперь войди.';
    document.getElementById('authPassword').value = '';
};

document.getElementById('btnLogin').onclick = function() {
    const nick = document.getElementById('authNickname').value.trim();
    const pass = document.getElementById('authPassword').value.trim();
    const msg = document.getElementById('authMsg');
    msg.style.color = 'var(--accent)';
    
    if (!nick || !pass) { msg.textContent = '⚠️ Заполни все поля!'; return; }
    
    const users = JSON.parse(localStorage.getItem('reddrop_users') || '{}');
    if (!users[nick]) { msg.textContent = '⚠️ Пользователь не найден!'; return; }
    if (users[nick].password !== pass) { msg.textContent = '⚠️ Неверный пароль!'; return; }
    
    currentUser = { nickname: nick, ...users[nick] };
    localStorage.setItem('reddrop_current_user', JSON.stringify(currentUser));
    updateNavForAuth();
    msg.style.color = '#4caf50';
    msg.textContent = '✅ Вход выполнен!';
    setTimeout(() => showScreen('screen-feed'), 500);
    loadProfile();
};

document.getElementById('btnLogout').onclick = function() {
    currentUser = null;
    localStorage.removeItem('reddrop_current_user');
    updateNavForAuth();
    showScreen('screen-feed');
    toast('Вы вышли');
};

function updateNavForAuth() {
    const last = document.querySelectorAll('.nav-item')[2];
    if (currentUser) {
        last.setAttribute('data-screen', 'screen-profile');
        last.innerHTML = '<span class="nav-icon">👤</span><span>Профиль</span>';
    } else {
        last.setAttribute('data-screen', 'screen-auth');
        last.innerHTML = '<span class="nav-icon">👤</span><span>Войти</span>';
    }
}

function loadProfile() {
    if (!currentUser) return;
    document.getElementById('profileName').textContent = currentUser.nickname;
    document.getElementById('profileStatus').textContent = 'Spark ур. ' + (currentUser.spark?.level || 1);
    document.getElementById('profileLikes').textContent = currentUser.likes || 0;
    document.getElementById('profileSpark').textContent = 'Spark: ' + (currentUser.spark?.days || 0) + ' дн.';
}

// ===== ЗАГРУЗКА ВИДЕО =====
function loadFeed() {
    const c = document.getElementById('feedContainer');
    c.innerHTML = '';
    VIDEOS.forEach((v, i) => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
            <video src="${v.url}" loop muted playsinline autoplay preload="auto"></video>
            <div class="video-overlay">
                <div class="video-user">@${v.user}</div>
                <div class="video-desc">${v.name}</div>
            </div>
            <div class="video-actions">
                <div class="action-btn" onclick="likeVideo(${i})">
                    <div class="action-icon" id="like-icon-${i}">❤️</div>
                    <span class="action-count" id="like-count-${i}">0</span>
                </div>
                <div class="action-btn" onclick="shareVideo('${v.url}')">
                    <div class="action-icon">↗️</div>
                    <span class="action-count">Поделиться</span>
                </div>
            </div>`;
        c.appendChild(card);
    });
    
    // Автовоспроизведение при скролле
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const video = entry.target.querySelector('video');
            if (!video) return;
            if (entry.isIntersecting) video.play().catch(() => {});
            else video.pause();
        });
    }, { threshold: 0.7 });
    document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
}

function likeVideo(index) {
    if (!currentUser) { toast('⚠️ Войди, чтобы лайкать!'); return; }
    const icon = document.getElementById('like-icon-' + index);
    const countEl = document.getElementById('like-count-' + index);
    const videoId = VIDEOS[index].url;
    const users = JSON.parse(localStorage.getItem('reddrop_users') || '{}');
    const user = users[currentUser.nickname];
    
    if (!user.likedVideos) user.likedVideos = [];
    const isLiked = user.likedVideos.includes(videoId);
    
    if (isLiked) {
        icon.style.color = '';
        user.likedVideos = user.likedVideos.filter(id => id !== videoId);
        user.likes = Math.max(0, (user.likes || 1) - 1);
        countEl.textContent = Math.max(0, parseInt(countEl.textContent) - 1);
    } else {
        icon.style.color = 'var(--accent)';
        user.likedVideos.push(videoId);
        user.likes = (user.likes || 0) + 1;
        countEl.textContent = parseInt(countEl.textContent) + 1;
    }
    
    currentUser = { nickname: currentUser.nickname, ...user };
    users[currentUser.nickname] = user;
    localStorage.setItem('reddrop_users', JSON.stringify(users));
    localStorage.setItem('reddrop_current_user', JSON.stringify(currentUser));
    
    // Сохраняем счётчик лайков
    const likesData = JSON.parse(localStorage.getItem('reddrop_likes') || '{}');
    likesData[videoId] = (likesData[videoId] || 0) + (isLiked ? -1 : 1);
    localStorage.setItem('reddrop_likes', JSON.stringify(likesData));
}

function shareVideo(url) {
    if (navigator.share) navigator.share({ title: 'RedDrop', url: url });
    else { navigator.clipboard.writeText(url); toast('📋 Ссылка скопирована!'); }
}

// ===== ИНИЦИАЛИЗАЦИЯ =====
function init() {
    // Загружаем настройки
    const savedSettings = localStorage.getItem('reddrop_settings');
    if (savedSettings) settings = JSON.parse(savedSettings);
    applySettings();
    
    // Проверяем сохранённого пользователя
    const savedUser = localStorage.getItem('reddrop_current_user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        updateNavForAuth();
    }
    
    // Загружаем счётчики лайков
    const likesData = JSON.parse(localStorage.getItem('reddrop_likes') || '{}');
    
    loadFeed();
    
    // Восстанавливаем счётчики
    VIDEOS.forEach((v, i) => {
        const countEl = document.getElementById('like-count-' + i);
        if (countEl && likesData[v.url]) countEl.textContent = likesData[v.url];
    });
}

init();
</script>
</body>
</html>
